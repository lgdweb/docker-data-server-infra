version: '3.9'

services:
  msmtpd:
    image: crazymax/msmtpd:latest
    container_name: msmtpd
    environment:
      - TZ=Europe/Paris
      - SMTP_HOST=mail.infomaniak.com
      - SMTP_PORT=587
      - SMTP_TLS=on
      - SMTP_STARTTLS=on
      - SMTP_AUTH=on
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_DOMAIN=${HOSTNAME}.lgdweb.ovh
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'nc', '-z', '127.0.0.1', '2500']
      interval: 10s
      timeout: 5s
      retries: 3

  fail2ban:
    image: crazymax/fail2ban:1.1.0
    container_name: fail2ban
    depends_on:
      msmtpd:
        condition: service_healthy
    network_mode: 'host'
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - '/srv/fail2ban/data:/data'
      - '/srv/logs:/srv/logs:ro'
      - '/var/log:/var/log:ro'
    restart: unless-stopped
    environment:
      - TZ=Europe/Paris
      - F2B_LOG_TARGET=STDOUT
      - F2B_LOG_LEVEL=INFO
      - F2B_ACTION=%(action_mwl)s
      - F2B_DEST_EMAIL=${F2B_DEST_EMAIL}
  manager:
    image: jc21/nginx-proxy-manager:2.14.0
    container_name: nginx-proxy-manager
    environment:
      TZ: 'Europe/Paris'
    ports:
      - '80:80'
      - '443:443'
      - '81:81'
    volumes:
      - /srv/nginx-proxy-manager/data:/data
      - /srv/nginx-proxy-manager/data/letsencrypt:/etc/letsencrypt
      - /srv/logs/nginx-proxy-manager:/data/logs/
    networks:
      - reverse-proxy-nw
  main:
    image: lgdweb/nginx-test:latest
    container_name: nginx-main
    networks:
      - reverse-proxy-nw
    volumes:
      - /srv/logs/nginx:/var/log/nginx
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
  agent:
    image: portainer/agent:lts
    container_name: portainer-agent
    restart: unless-stopped
    networks:
      - portainer-default
    ports:
      - 9001:9001
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
  server:
    image: portainer/portainer-ce:lts
    container_name: portainer-server
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - portainer-default
      - reverse-proxy-nw
    ports:
      - '9443:9443'
      - '9000:9000'
      - '8000:8000'
    volumes:
      - /srv/portainer/data:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes

networks:
  portainer-default:
    attachable: true
  reverse-proxy-nw:
    external: true
